# Production (IP + HTTP) — kullanım:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up --build -d
#
# Önce .env.production içindeki CHANGE_ME ve SUNUCU_IP değerlerini güncelleyin.
# Ayrıntılar: DEPLOYMENT.md
#
# Dev ile aynı sunucuda çalışabilir: farklı container adları, volume ve portlar.

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hocapuan_prod_db
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5435}:5432"
    networks:
      - hocapuan_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ASP.NET Core API ─────────────────────────────────────────
  api:
    build:
      context: ./hocapuan-backend
      dockerfile: src/HocaPuan.API/Dockerfile
    container_name: hocapuan_prod_api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-HocaPuanAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-HocaPuanClient}
      JwtSettings__ExpirationHours: ${JWT_EXPIRATION_HOURS:-24}
      App__FrontendUrl: ${APP_FRONTEND_URL}
      Email__Host: ${EMAIL_HOST}
      Email__Port: ${EMAIL_PORT:-587}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__From: ${EMAIL_FROM:-noreply@hocapuan.com}
      Cors__AllowedOrigins__0: ${ALLOWED_ORIGIN}
      USE_HTTPS: ${USE_HTTPS:-false}
    ports:
      - "${API_PORT:-5011}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hocapuan_prod_net

  # ─── React + Vite Frontend ────────────────────────────────────
  # TODO: Production nginx + static build burada eklenecek, şu an dev build kullanılıyor.
  frontend:
    build:
      context: ./hocapuan-frontend
      dockerfile: Dockerfile
      target: dev
    container_name: hocapuan_prod_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8089}:5173"
    environment:
      - VITE_API_URL=http://api:8080
      - VITE_DISABLE_HMR=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - api
    networks:
      - hocapuan_prod_net

volumes:
  postgres_data_prod:

networks:
  hocapuan_prod_net:
    driver: bridge
